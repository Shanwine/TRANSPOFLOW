<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranspoFlow</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #1a1a40;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .login-wrapper {
            display: flex;
            width: 100%;
            max-width: 900px;
            min-height: 520px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            margin: 2rem;
        }
        /* Left Panel */
        .left-panel {
            flex: 1;
            background: linear-gradient(145deg, #3b4fc8, #00c6a7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 2rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .left-panel::before {
            content: '';
            position: absolute;
            width: 300px; height: 300px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            top: -80px; left: -80px;
        }
        .left-panel::after {
            content: '';
            position: absolute;
            width: 200px; height: 200px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            bottom: -50px; right: -50px;
        }
        .left-panel h1 {
            color: white;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            z-index: 1;
        }
        .left-panel p {
            color: rgba(255,255,255,0.8);
            font-size: 0.95rem;
            z-index: 1;
            max-width: 220px;
        }
        .bus-icon {
            width: 100px; height: 100px;
            background: rgba(255,255,255,0.15);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            z-index: 1;
        }
        .bus-icon i {
            font-size: 3rem;
            color: white;
        }
        .feature-list {
            margin-top: 2rem;
            z-index: 1;
            text-align: left;
        }
        .feature-list div {
            color: rgba(255,255,255,0.85);
            font-size: 0.875rem;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .feature-list i {
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            padding: 5px;
            font-size: 14px;
        }
        /* Right Panel */
        .right-panel {
            flex: 1;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
        }
        .right-panel .inner {
            width: 100%;
            max-width: 360px;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side -->
        <div class="left-panel">
            <div class="bus-icon">
                <i class="bi bi-bus-front"></i>
            </div>
            <h1>TranspoFlow</h1>
            <p>Smart Transportation Management System</p>
            <div class="feature-list">
                <div><i class="bi bi-geo-alt-fill"></i> Live Driver Tracking</div>
                <div><i class="bi bi-calendar-check"></i> Easy Booking System</div>
                <div><i class="bi bi-truck-front"></i> Fleet Management</div>
                <div><i class="bi bi-fuel-pump"></i> Fuel Monitoring</div>
            </div>
        </div>

        <!-- Right Side — Login Form -->
        <div class="right-panel">
            <div class="inner">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
