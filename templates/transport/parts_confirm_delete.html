{% extends 'base.html' %}

{% block content %}
<div style="background:#fff; border-radius:10px; padding:28px; border:1px solid #e0e6ef; max-width:500px; margin:auto;">
  <h4 style="font-weight:700; margin-bottom:12px;">Delete Part</h4>
  <p>Are you sure you want to delete <strong>{{ part.name }}</strong>?</p>
  <form method="post" style="margin-top:20px;">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="{% url 'parts_list' %}" class="btn btn-secondary">Cancel</a>
  </form>
</div>
{% endblock %}
