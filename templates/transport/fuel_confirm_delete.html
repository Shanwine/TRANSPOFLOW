{% extends 'base.html' %}
{% block page_title %}Delete Fuel Log{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 text-center">
      <i class="bi bi-exclamation-triangle text-danger" style="font-size:3rem;"></i>
      <h5 class="fw-bold mt-3">Delete Fuel Log?</h5>
      <p class="text-muted">{{ fuel.vehicle }} — {{ fuel.liters }}L on {{ fuel.date }}</p>
      <form method="POST" class="d-flex gap-2 justify-content-center mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Yes, Delete</button>
        <a href="{% url 'fuel_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
