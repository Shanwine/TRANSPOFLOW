{% extends 'base.html' %}
{% block content %}

<div class="d-flex align-items-center gap-3 mb-4">
  <a href="{% url 'schedule_list' %}" class="btn btn-outline-secondary btn-sm rounded-circle"
     style="width:36px; height:36px; display:flex; align-items:center; justify-content:center;">
    <i class="bi bi-arrow-left"></i>
  </a>
  <div>
    <h5 class="fw-bold mb-0">Add Trip Schedule</h5>
    <small class="text-muted">Set a recurring daily schedule for Van/Bus</small>
  </div>
</div>

<div class="card border-0 shadow-sm mx-auto" style="max-width:620px;">

  <div class="card-header border-0 pt-4 px-4 pb-0 bg-white">
    <div class="d-flex gap-3">
      <div class="rounded-2 d-flex align-items-center justify-content-center"
           style="width:46px; height:46px; background:#e8f0fe; flex-shrink:0;">
        <i class="bi bi-calendar-plus-fill text-primary" style="font-size:1.3rem;"></i>
      </div>
      <div>
        <div class="fw-bold" style="font-size:1rem;">New Schedule</div>
        <div class="text-muted" style="font-size:0.82rem;">Fill in the details below to create a recurring trip.</div>
      </div>
    </div>
    <hr class="mt-3 mb-0">
  </div>

  <div class="card-body p-4">
    <form method="post">
      {% csrf_token %}

      <div class="row g-3">

        <!-- Route Section -->
        <div class="col-12">
          <p class="text-muted small fw-semibold text-uppercase mb-2" style="letter-spacing:0.05em;">
            <i class="bi bi-map me-1"></i> Route
          </p>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Origin</label>
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-geo-alt text-muted"></i>
            </span>
            <input type="text" name="origin" class="form-control border-start-0 ps-0"
                   required placeholder="e.g. Surigao City">
          </div>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Destination</label>
          <div class="input-group">
            <span class="input-group-text bg-white">
              <i class="bi bi-geo-alt-fill text-primary"></i>
            </span>
            <input type="text" name="destination" class="form-control border-start-0 ps-0"
                   required placeholder="e.g. Butuan City">
          </div>
        </div>

        <!-- Assignment Section -->
        <div class="col-12 mt-2">
          <p class="text-muted small fw-semibold text-uppercase mb-2" style="letter-spacing:0.05em;">
            <i class="bi bi-truck me-1"></i> Assignment
          </p>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Vehicle</label>
          <select name="vehicle" class="form-select" required>
            <option value="">-- Select Vehicle --</option>
            {% for v in vehicles %}
              <option value="{{ v.pk }}">{{ v.get_type_display }} — {{ v.name }} ({{ v.plate_number }})</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Driver</label>
          <select name="driver" class="form-select">
            <option value="">-- Select Driver --</option>
            {% for d in drivers %}
              <option value="{{ d.pk }}">{{ d.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- Schedule Section -->
        <div class="col-12 mt-2">
          <p class="text-muted small fw-semibold text-uppercase mb-2" style="letter-spacing:0.05em;">
            <i class="bi bi-clock me-1"></i> Schedule & Fare
          </p>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Time Slot</label>
          <select name="time_slot" class="form-select" required>
            <option value="">-- Select Time --</option>
            {% for value, label in time_slots %}
              <option value="{{ value }}">{{ label }}</option>
            {% endfor %}
          </select>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Fare per Seat (₱)</label>
          <div class="input-group">
            <span class="input-group-text bg-white fw-bold text-primary">₱</span>
            <input type="number" name="fare_per_seat" class="form-control border-start-0 ps-0"
                   value="0" min="0" step="0.01">
          </div>
        </div>

        <div class="col-6">
          <label class="form-label fw-semibold small">Commission Rate (%)</label>
          <div class="input-group">
            <input type="number" name="commission_rate" class="form-control border-end-0"
                   value="10" min="10" max="30">
            <span class="input-group-text bg-white text-muted">%</span>
          </div>
        </div>

        <div class="col-6 d-flex align-items-end pb-1">
          <div class="form-check form-switch">
            <input class="form-check-input" type="checkbox" name="is_active"
                   id="is_active" checked style="width:2.5em; height:1.3em;">
            <label class="form-check-label fw-semibold ms-1" for="is_active">Active</label>
          </div>
        </div>

      </div>

      <!-- Buttons -->
      <div class="d-flex gap-2 mt-4 pt-2 border-top">
        <button type="submit" class="btn btn-primary fw-bold px-4">
          <i class="bi bi-check-circle me-1"></i> Save Schedule
        </button>
        <a href="{% url 'schedule_list' %}" class="btn btn-outline-secondary px-4">
          Cancel
        </a>
      </div>

    </form>
  </div>
</div>

{% endblock %}
