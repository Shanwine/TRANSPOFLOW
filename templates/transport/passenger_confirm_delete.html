{% extends 'base.html' %}

{% block content %}
<h1>Delete Passenger</h1>
<p>Are you sure you want to delete "{{ passenger }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'passenger_list' passenger.trip.id %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
