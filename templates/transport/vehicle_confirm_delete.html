{% extends 'base.html' %}

{% block content %}
<h1>Delete Vehicle</h1>
<p>Are you sure you want to delete "{{ vehicle }}"?</p>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Delete</button>
    <a href="{% url 'vehicle_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
